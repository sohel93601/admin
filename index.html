<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERO ADMIN CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --gold:#FFDE03; --red:#E63946; --blue:#1E90FF; --green:#22c55e; --bg:#f3f4f6; --card:#fff; --ink:#000; }
* { box-sizing:border-box; margin:0; padding:0; font-family:'Inter', sans-serif; }
body { background: var(--bg); color: var(--ink); padding-bottom: 60px; }
.bf { font-family:'Bangers', cursive; letter-spacing:1px; }
header { background: var(--ink); color:#fff; padding:16px; display:flex; justify-content:space-between; align-items:center; }
.cc { background:var(--card); border:3px solid var(--ink); box-shadow:4px 4px 0 var(--ink); padding:16px; margin:16px; }
.tabs { display:flex; background:var(--card); border-bottom:3px solid var(--ink); overflow-x:auto; }
.tab-b { flex:1; text-align:center; padding:12px; font-weight:900; font-size:12px; cursor:pointer; border-right:1px solid #eee; white-space:nowrap; }
.tab-b.on { background:var(--gold); }
.panel { display:none; padding:12px; }
.panel.on { display:block; }
.cb { border:3px solid var(--ink); box-shadow:3px 3px 0 var(--ink); font-weight:900; padding:10px 16px; cursor:pointer; text-transform:uppercase; background:var(--gold); }
.cb:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
input, select, textarea { width:100%; padding:10px; border:2px solid var(--ink); font-weight:700; margin-bottom:12px; outline:none; }
label { font-size:11px; font-weight:900; text-transform:uppercase; display:block; margin-bottom:4px; color:#444; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.card-item { background:#fff; border:2px solid var(--ink); padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.bpend { background:#f97316; color:#fff; font-size:10px; font-weight:900; padding:2px 6px; border:2px solid var(--ink); }
.bapp { background:var(--green); color:#fff; font-size:10px; font-weight:900; padding:2px 6px; border:2px solid var(--ink); }
.brej { background:var(--red); color:#fff; font-size:10px; font-weight:900; padding:2px 6px; border:2px solid var(--ink); }
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 20px; font-weight:900; display:none; z-index:9999; border:2px solid #fff; }
.rt-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); margin-right:6px; animation:rtp 2s infinite; }
@keyframes rtp { 0%,100% { opacity:1 } 50% { opacity:.2 } }
</style>
</head>
<body>
<div id="toast"></div>

<header>
  <h1 class="bf" style="font-size:24px;">⚙️ HERO PANEL</h1>
  <div style="font-size:11px; font-weight:900;"><span class="rt-dot"></span>LIVE SYNC</div>
</header>

<div class="tabs">
  <div class="tab-b on" id="b-dash" onclick="go('dash')">📊 DASH</div>
  <div class="tab-b" id="b-tasks" onclick="go('tasks')">⚡ TASKS</div>
  <div class="tab-b" id="b-pays" onclick="go('pays')">💰 PAYOUTS</div>
  <div class="tab-b" id="b-users" onclick="go('users')">👥 USERS</div>
</div>

<div id="p-dash" class="panel on">
  <div class="grid-2" style="margin-bottom:10px;">
    <div class="cc" style="margin:0; background:#fef9c3;">
      <label>Total Registered Users</label>
      <div id="d-u" class="bf" style="font-size:32px;">0</div>
    </div>
    <div class="cc" style="margin:0; background:#ede9fe;">
      <label>Total Active Tasks</label>
      <div id="d-t" class="bf" style="font-size:32px;">0</div>
    </div>
  </div>
  
  <div class="cc" style="margin:0; background:#dcfce7; margin-bottom:16px;">
    <label>Pending Withdrawals</label>
    <div id="d-p" class="bf" style="font-size:32px; color:var(--red);">0</div>
  </div>

  <div class="cc" style="margin:0;">
    <h3 class="bf" style="font-size:20px; margin-bottom:10px;">📢 BROADCAST ANNOUNCEMENT</h3>
    <label>Announcement Content</label>
    <textarea id="ann-input" rows="3" placeholder="Enter text for all users..."></textarea>
    <button class="cb" onclick="sendAnn()" style="width:100%;">PUBLISH BROADCAST</button>
  </div>
</div>

<div id="p-tasks" class="panel">
  <div class="cc" style="margin:0; margin-bottom:16px;">
    <h3 class="bf" style="font-size:20px; margin-bottom:12px;">➕ ADD NEW MISSION</h3>
    <label>Mission Name / Title</label>
    <input type="text" id="t-name" placeholder="e.g. Follow Twitter Account">
    <label>Reward Coins</label>
    <input type="number" id="t-coins" placeholder="100">
    <label>Mission Type / Category</label>
    <input type="text" id="t-type" placeholder="Telegram, Twitter, Youtube">
    <label>Mission URL / Link (Optional)</label>
    <input type="url" id="t-link" placeholder="https://...">
    <button class="cb" onclick="addTask()" style="width:100%;">CREATE MISSION</button>
  </div>

  <div class="bf" style="font-size:20px; margin-left:4px; margin-bottom:8px;">📋 MANAGE ACTIVE TASKS</div>
  <div id="list-tasks"></div>
</div>

<div id="p-pays" class="panel">
  <div class="bf" style="font-size:20px; margin-left:4px; margin-bottom:8px;">⏳ PENDING WITHDRAWALS</div>
  <div id="list-pays-pending"></div>
  
  <div class="bf" style="font-size:20px; margin-left:4px; margin-top:16px; margin-bottom:8px;">✅ RECENT RESOLVED PAYOUTS</div>
  <div id="list-pays-done"></div>
</div>

<div id="p-users" class="panel">
  <div class="cc" style="margin:0; margin-bottom:12px;">
    <label>Search User by ID or Name</label>
    <input type="text" id="u-search" oninput="searchUser()" placeholder="Type ID or Name...">
  </div>
  <div id="list-users"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
/* ── FIREBASE CONFIGURATION ── */
const firebaseConfig = {
  apiKey: "AIzaSyCv8HcH4-6VdYgCcdOZlR-MTL4HbL-Is7Y",
  authDomain: "gen-lang-client-0231834349.firebaseapp.com",
  databaseURL: "https://gen-lang-client-0231834349-default-rtdb.firebaseio.com",
  projectId: "gen-lang-client-0231834349",
  storageBucket: "gen-lang-client-0231834349.firebasestorage.app",
  messagingSenderId: "148097864437",
  appId: "1:148097864437:web:a9d15cd9b249d8cbb52bbc"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

/* ── APP INITIALIZATION ── */
function init() {
  showToast("🔄 CONNECTING TO LIVE DATABASE...");
  listenData();
}

/* ── REALTIME DATABASE LISTENERS ── */
function listenData() {
  // 1. Users Counter & List
  db.collection('users').onSnapshot(function(snap) {
    document.getElementById('d-u').innerText = snap.size;
    renderUsers(snap.docs.map(d => d.data()));
  });

  // 2. Tasks Management
  db.collection('tasks').orderBy('createdAt', 'desc').onSnapshot(function(snap) {
    document.getElementById('d-t').innerText = snap.size;
    renderTasks(snap.docs.map(d => Object.assign({_id: d.id}, d.data())));
  });

  // 3. Withdrawals Management
  db.collection('withdrawals').orderBy('createdAt', 'desc').onSnapshot(function(snap) {
    var all = snap.docs.map(d => Object.assign({_id: d.id}, d.data()));
    var pending = all.filter(w => w.status === 'pending');
    var done = all.filter(w => w.status !== 'pending');
    
    document.getElementById('d-p').innerText = pending.length;
    renderPayouts(pending, done);
  });
}

/* ── UI TAB CONTROLLER ── */
function go(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab-b').forEach(b => b.classList.remove('on'));
  document.getElementById('p-' + id).classList.add('on');
  document.getElementById('b-' + id).classList.add('on');
}

/* ── ANNOUNCEMENT CONTROLLER ── */
function sendAnn() {
  var txt = document.getElementById('ann-input').value.trim();
  if(!txt) return showToast("❌ CANNOT SEND EMPTY BROADCAST!");
  
  showToast("⏳ PUBLISHING...");
  db.collection('announcements').add({
    title: txt,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    showToast("📢 BROADCAST PUBLISHED SUCCESSFULLY!");
    document.getElementById('ann-input').value = '';
  }).catch(e => showToast("❌ ERROR: " + e.message));
}

/* ── TASK ACTIONS ── */
function addTask() {
  var name = document.getElementById('t-name').value.trim();
  var coins = parseInt(document.getElementById('t-coins').value) || 0;
  var type = document.getElementById('t-type').value.trim();
  var link = document.getElementById('t-link').value.trim();

  if(!name || !coins || !type) return showToast("❌ PLEASE FILL ALL MANDATORY FIELDS!");

  showToast("⏳ CREATING TASK...");
  db.collection('tasks').add({
    name: name,
    reward: coins,
    type: type,
    link: link || null,
    isActive: true,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    showToast("✅ TASK SAVED TO LIVE DB!");
    document.getElementById('t-name').value = '';
    document.getElementById('t-coins').value = '';
    document.getElementById('t-type').value = '';
    document.getElementById('t-link').value = '';
  }).catch(e => showToast("❌ SAVE FAILED: " + e.message));
}

function deleteTask(id) {
  if(!confirm("ARE YOU SURE YOU WANT TO DELETE THIS MISSION?")) return;
  showToast("⏳ DELETING...");
  db.collection('tasks').doc(id).delete()
    .then(() => showToast("🗑️ MISSION REMOVED!"))
    .catch(e => showToast("❌ ERROR: " + e.message));
}

function renderTasks(arr) {
  var el = document.getElementById('list-tasks');
  if(!arr.length) { el.innerHTML = '<p style="padding:16px;text-align:center;font-weight:700;color:#666;">No active missions found.</p>'; return; }
  
  el.innerHTML = arr.map(t => `
    <div class="card-item">
      <div>
        <div style="font-weight:900;text-transform:uppercase;">${esc(t.name)}</div>
        <div style="font-size:11px;color:var(--blue);font-weight:700;">${esc(t.type)} • +${t.reward} 🪙</div>
      </div>
      <button class="cb" onclick="deleteTask('${t._id}')" style="background:var(--red);color:#fff;padding:4px 10px;font-size:11px;box-shadow:2px 2px 0 #000;">DELETE</button>
    </div>
  `).join('');
}

/* ── PAYOUT ACTIONS ── */
function actionPay(id, status) {
  if(!confirm(`MARK THIS TRANSACTION AS ${status.toUpperCase()}?`)) return;
  showToast("⏳ UPDATING TRANSACTION STATE...");
  db.collection('withdrawals').doc(id).update({ status: status })
    .then(() => showToast(`⚡ REQUEST ${status.toUpperCase()} SUCCESSFULLY!`))
    .catch(e => showToast("❌ ACTION FAILED: " + e.message));
}

function renderPayouts(pending, done) {
  var pEl = document.getElementById('list-pays-pending');
  var dEl = document.getElementById('list-pays-done');
  
  if(!pending.length) { pEl.innerHTML = '<p style="padding:12px;color:#777;font-weight:700;">🎉 No pending payout requests!</p>'; }
  else {
    pEl.innerHTML = pending.map(w => `
      <div class="cc" style="margin:4px 0 10px 0;border-color:var(--red);">
        <div style="display:flex;justify-content:between;align-items:center;margin-bottom:8px;font-weight:900;">
          <span style="font-size:16px;color:var(--red); flex:1;">-${w.amount} 🪙 (${w.userName || 'Hero'})</span>
          <span style="font-size:10px;color:#666;">ID: ${w.userId}</span>
        </div>
        <div style="font-family:monospace;font-size:12px;background:#eee;padding:6px;margin-bottom:10px;word-break:break-all;border:1px dashed #000;">${esc(w.usdcAddress)}</div>
        <div class="grid-2">
          <button class="cb" onclick="actionPay('${w._id}','approved')" style="background:var(--green);color:#fff;font-size:12px;padding:6px;">APPROVE</button>
          <button class="cb" onclick="actionPay('${w._id}','rejected')" style="background:var(--red);color:#fff;font-size:12px;padding:6px;">REJECT</button>
        </div>
      </div>
    `).join('');
  }
  
  if(!done.length) { dEl.innerHTML = '<p style="padding:12px;color:#777;">No previous actions logged.</p>'; }
  else {
    dEl.innerHTML = done.slice(0, 15).map(w => {
      var sCls = w.status === 'approved' ? 'bapp' : 'brej';
      return `
        <div class="card-item" style="opacity:0.85;">
          <div>
            <div style="font-weight:900;">-${w.amount} 🪙 • ${esc(w.userName)}</div>
            <div style="font-size:10px;font-family:monospace;color:#666;max-width:220px;overflow:hidden;text-overflow:ellipsis;">${esc(w.usdcAddress)}</div>
          </div>
          <span class="${sCls}">${w.status.toUpperCase()}</span>
        </div>
      `;
    }).join('');
  }
}

/* ── USERS CONTROLLER ── */
function renderUsers(arr) {
  var el = document.getElementById('list-users');
  if(!arr.length) { el.innerHTML = '<p style="padding:16px;text-align:center;">Database is completely empty.</p>'; return; }
  
  el.innerHTML = arr.map(u => `
    <div class="card-item user-row">
      <div>
        <div style="font-weight:900;" class="u-meta">${esc(u.name || 'Hero')}</div>
        <div style="font-size:11px;color:#666;" class="u-meta">ID: ${u.id} • RefBy: ${u.refferBy || 'NONE'}</div>
      </div>
      <div style="text-align:right;font-weight:900;color:var(--green);font-size:14px;">${u.coins || 0} 🪙</div>
    </div>
  `).join('');
}

function searchUser() {
  var q = document.getElementById('u-search').value.toLowerCase().trim();
  document.querySelectorAll('#list-users .user-row').forEach(function(row) {
    row.style.display = row.querySelector('.u-meta').innerText.toLowerCase().includes(q) ? 'flex' : 'none';
  });
}

/* ── TOAST MESSAGES ── */
var _toastT;
function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.innerText = msg; t.style.display = 'block';
  clearTimeout(_toastT);
  _toastT = setTimeout(function(){ t.style.display='none'; }, 3500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* Run initial functions */
init();
</script>
</body>
</html>
